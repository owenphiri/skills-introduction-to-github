# HardWare Plus POS — Production deployment with Caddy automatic HTTPS.
#
#   1. Point your domain's DNS A record at the server IP.
#   2. Copy .env.example to .env and fill in DOMAIN + any overrides.
#   3. docker compose up -d
#
# Caddy handles TLS termination; the app is never exposed directly to the internet.

services:
  app:
    build: .
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - POS_DB=/app/data/pos.db
      - BUSINESS_NAME=${BUSINESS_NAME:-HardWare Plus}
      - BUSINESS_ADDRESS=${BUSINESS_ADDRESS:-23 Cairo Road, Lusaka, Zambia}
      - BUSINESS_PHONE=${BUSINESS_PHONE:-+260 211 234 567}
      - BUSINESS_EMAIL=${BUSINESS_EMAIL:-sales@hardwareplus.co.zm}
      - VAT_RATE=${VAT_RATE:-16}
      - CURRENCY=${CURRENCY:-ZMW}
      - CURRENCY_SYMBOL=${CURRENCY_SYMBOL:-K}
      - TIN_NUMBER=${TIN_NUMBER:-}
      - VAT_NUMBER=${VAT_NUMBER:-}
      - RECEIPT_FOOTER=${RECEIPT_FOOTER:-Thank you for your business!}
    volumes:
      - pos-data:/app/data
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  pos-data:
  caddy-data:
  caddy-config:
