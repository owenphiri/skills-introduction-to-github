name: VoltexAI CI

on:
  push:
    branches: ["**"]
    paths: ["voltexai/**", ".github/workflows/voltexai-ci.yml"]
  pull_request:
    paths: ["voltexai/**", ".github/workflows/voltexai-ci.yml"]

jobs:
  backend:
    name: Backend (FastAPI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: voltexai/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: voltexai/backend/requirements-dev.txt
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Run test suite
        working-directory: voltexai
        run: pytest

  frontend:
    name: Frontend (Vite/React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: voltexai/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: voltexai/frontend/package-lock.json
      - name: Install
        run: npm install
      - name: Build
        run: npm run build
